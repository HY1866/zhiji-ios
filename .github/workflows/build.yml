name: Build ZhiJi iOS App

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Show Xcode Version
      run: |
        xcodebuild -version
        xcrun simctl list runtimes

    - name: Cache Derived Data
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          ios/build
        key: ${{ runner.os }}-xcode-${{ hashFiles('ios/ZhiJi.xcodeproj/project.pbxproj') }}
        restore-keys: |
          ${{ runner.os }}-xcode-

    - name: Build for Simulator
      working-directory: ios
      run: |
        xcodebuild clean build \
          -project ZhiJi.xcodeproj \
          -scheme ZhiJi \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Archive (Development)
      working-directory: ios
      if: success()
      run: |
        mkdir -p build
        xcodebuild archive \
          -project ZhiJi.xcodeproj \
          -scheme ZhiJi \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/ZhiJi.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: xcarchive
        path: ios/build/ZhiJi.xcarchive
        retention-days: 30

    - name: Build Summary
      run: |
        echo "## ✅ Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 构建信息" >> $GITHUB_STEP_SUMMARY
        echo "- 状态: 成功" >> $GITHUB_STEP_SUMMARY
        echo "- 平台: iOS Simulator + Generic iOS Device" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 下一步" >> $GITHUB_STEP_SUMMARY
        echo "1. 下载 Artifacts 中的 xcarchive" >> $GITHUB_STEP_SUMMARY
        echo "2. 在本地Mac上完成签名和导出" >> $GITHUB_STEP_SUMMARY
